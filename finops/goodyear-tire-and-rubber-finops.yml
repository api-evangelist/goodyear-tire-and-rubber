alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Goodyear Tire & Rubber
providerId: goodyear-tire-and-rubber
publisherName: The Goodyear Tire & Rubber Company
serviceCategory: Connected Vehicles / Tire Telematics
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Connected Vehicles
  - Fleet Management
  - IoT
  - Telematics
  - Tires
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Goodyear''s SightLine + GaaS API portfolio: enterprise/partner-contracted
  access where commercial terms are not publicly disclosed. Meters reflect the consumption shape consumers
  should expect to track (vehicle/tire telematics ingest, catalog and work-order traffic).'
notes: No public pricing or invoice surface was found at reconciliation time. Billing model assumes a contracted
  recurring fee plus optional usage-based components negotiated through the GaaS portal; replace once the
  partner agreement terms are known.
sources:
  - https://developer.goodyearsightline.com/
  - https://gaas-portal.goodyear.com/
billingModel:
  pricingCategory: Enterprise Contract
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Goodyear SightLine / GaaS APIs
  ServiceCategory: Connected Vehicles / Tire Telematics
  ProviderName: Goodyear Tire & Rubber
  PublisherName: The Goodyear Tire & Rubber Company
  InvoiceIssuerName: The Goodyear Tire & Rubber Company
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests across the SightLine + GaaS surface
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - consumer
  - name: tire_data_events
    description: Telematics events ingested per vehicle/tire from SightLine
    unit: event
    aggregation: sum
    dimensions:
      - vehicle
      - fleet
      - region
  - name: connected_vehicles
    description: Active connected vehicles or tires under contract
    unit: vehicle
    aggregation: max
    dimensions:
      - fleet
      - region
  - name: work_orders
    description: Work orders / service tickets transacted via the truck tire APIs
    unit: ticket
    aggregation: sum
    dimensions:
      - api
      - fleet
apis:
  - name: Goodyear SightLine API
    baseURL: https://developer.goodyearsightline.com
    serviceName: Goodyear SightLine API
    serviceCategory: Tire Telematics
  - name: Goodyear API Management Portal
    baseURL: https://gaas-portal.goodyear.com
    serviceName: Goodyear API Management Portal
    serviceCategory: API Management
  - name: Goodyear Truck Tire Catalog API
    baseURL: https://api.catalog.goodyeartrucktires.com
    serviceName: Goodyear Truck Tire Catalog API
    serviceCategory: Catalog
  - name: Goodyear Work Order API
    baseURL: https://api.workorder.goodyeartrucktires.com
    serviceName: Goodyear Work Order API
    serviceCategory: Fleet Management
  - name: Goodyear Service Ticket API
    baseURL: https://api.serviceticket.goodyeartrucktires.com
    serviceName: Goodyear Service Ticket API
    serviceCategory: Fleet Management
principles:
  - name: Visibility
    description: Track SightLine telematics ingest volume and GaaS API request counts per fleet via the
      partner portal usage views; export to your data warehouse for cross-charging.
  - name: Allocation
    description: Tag API consumers by fleet ID and vehicle ID so tire-telematics and work-order spend can
      be attributed to the operating unit owning each fleet.
  - name: Optimization
    description: Reduce SightLine event ingest cost by tuning sampling intervals on low-risk axles, batching
      catalog lookups, and consolidating service-ticket polling.
  - name: Accountability
    description: Assign each fleet contract a budget owner; reconcile Goodyear invoices against the consumed
      vehicles and ticket volume captured in your fleet system of record.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
