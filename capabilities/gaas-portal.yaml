naftiko: 1.0.0-alpha2
info:
  label: Goodyear API Management Portal (GaaS)
  description: 'Goodyear API Management Portal (GaaS). 5 operations. Lead operation: Get Tire Catalog. Self-contained Naftiko
    capability covering one Goodyear Tire And Rubber business surface.'
  tags:
  - Goodyear Tire And Rubber
  - Goodyear API Management Portal (GaaS)
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOODYEAR_TIRE_AND_RUBBER_API_KEY: GOODYEAR_TIRE_AND_RUBBER_API_KEY
capability:
  consumes:
  - type: http
    namespace: gaas-portal
    baseUri: https://gaas-portal.goodyear.com
    description: Goodyear API Management Portal (GaaS) business capability. Self-contained, no shared references.
    resources:
    - name: catalog
      path: /catalog
      operations:
      - name: gettirecatalog
        method: GET
        description: Get Tire Catalog
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: service-tickets
      path: /service-tickets
      operations:
      - name: getservicetickets
        method: GET
        description: Get Service Tickets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createserviceticket
        method: POST
        description: Create Service Ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: work-orders
      path: /work-orders
      operations:
      - name: getworkorders
        method: GET
        description: Get Work Orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createworkorder
        method: POST
        description: Create Work Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: gaas-portal-rest
    port: 8080
    description: REST adapter for Goodyear API Management Portal (GaaS). One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/catalog
      name: catalog
      description: REST surface for catalog.
      operations:
      - method: GET
        name: gettirecatalog
        description: Get Tire Catalog
        call: gaas-portal.gettirecatalog
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/service-tickets
      name: service-tickets
      description: REST surface for service-tickets.
      operations:
      - method: GET
        name: getservicetickets
        description: Get Service Tickets
        call: gaas-portal.getservicetickets
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createserviceticket
        description: Create Service Ticket
        call: gaas-portal.createserviceticket
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/work-orders
      name: work-orders
      description: REST surface for work-orders.
      operations:
      - method: GET
        name: getworkorders
        description: Get Work Orders
        call: gaas-portal.getworkorders
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createworkorder
        description: Create Work Order
        call: gaas-portal.createworkorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gaas-portal-mcp
    port: 9090
    transport: http
    description: MCP adapter for Goodyear API Management Portal (GaaS). One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-tire-catalog
      description: Get Tire Catalog
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gaas-portal.gettirecatalog
      outputParameters:
      - type: object
        mapping: $.
    - name: get-service-tickets
      description: Get Service Tickets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gaas-portal.getservicetickets
      outputParameters:
      - type: object
        mapping: $.
    - name: create-service-ticket
      description: Create Service Ticket
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gaas-portal.createserviceticket
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-work-orders
      description: Get Work Orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gaas-portal.getworkorders
      outputParameters:
      - type: object
        mapping: $.
    - name: create-work-order
      description: Create Work Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gaas-portal.createworkorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
