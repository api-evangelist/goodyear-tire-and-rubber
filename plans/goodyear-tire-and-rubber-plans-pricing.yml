description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: goodyear-tire-and-rubber-free
    name: Free
    type: freemium
    description: Free entry tier for the Goodyear Tire & Rubber API surface. Intended for evaluation,
      prototyping, and low-volume integrations. Real limits and pricing must be reconciled with the provider's
      published plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://developer.goodyearsightline.com
          - https://gaas-portal.goodyear.com
          - https://api.catalog.goodyeartrucktires.com
          - https://api.workorder.goodyeartrucktires.com
          - https://api.serviceticket.goodyeartrucktires.com
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://developer.goodyearsightline.com
          - https://gaas-portal.goodyear.com
          - https://api.catalog.goodyeartrucktires.com
          - https://api.workorder.goodyeartrucktires.com
          - https://api.serviceticket.goodyeartrucktires.com
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Community Support
      - name: Sandbox Access
      - name: Goodyear SightLine API
      - name: Goodyear API Management Portal
      - name: Goodyear Truck Tire Catalog API
      - name: Goodyear Work Order API
      - name: Goodyear Service Ticket API
  - id: goodyear-tire-and-rubber-pro
    name: Professional
    type: paid
    description: Production tier for Goodyear Tire & Rubber. Provides higher quotas, priority support,
      and access to the broader API portfolio. Pricing placeholder; align with the provider's pricing
      page.
    entries:
      - label: API Requests
        description: Monthly API request quota
        name: api_requests
        type: quota
        metric: requests
        limit: 100000
        timeFrame: month
        geo: global
        domains:
          - https://developer.goodyearsightline.com
          - https://gaas-portal.goodyear.com
          - https://api.catalog.goodyeartrucktires.com
          - https://api.workorder.goodyeartrucktires.com
          - https://api.serviceticket.goodyeartrucktires.com
        unit: 1
        price: TBD
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the professional tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: global
        domains:
          - https://developer.goodyearsightline.com
          - https://gaas-portal.goodyear.com
          - https://api.catalog.goodyeartrucktires.com
          - https://api.workorder.goodyeartrucktires.com
          - https://api.serviceticket.goodyeartrucktires.com
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Overage
        description: Per-request price after monthly quota is exceeded
        name: overage
        type: metered
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://developer.goodyearsightline.com
          - https://gaas-portal.goodyear.com
          - https://api.catalog.goodyeartrucktires.com
          - https://api.workorder.goodyeartrucktires.com
          - https://api.serviceticket.goodyeartrucktires.com
        unit: 1000
        price: TBD
        userMultiplied: false
