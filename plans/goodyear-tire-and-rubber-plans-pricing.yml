description: Goodyear's developer APIs (SightLine, GaaS portal, Truck Tire Catalog, Work Order, Service
  Ticket) are gated behind partner/enterprise onboarding. No public pricing page lists per-tier costs,
  rate caps, or overage rates. Access and commercial terms are negotiated via the GaaS portal signup or
  direct sales engagement.
notes: No public pricing was found on developer.goodyearsightline.com or gaas-portal.goodyear.com at reconciliation
  time. Plans below are placeholders that reflect the typical access shape for an enterprise B2B fleet
  data provider; replace with contracted terms once available.
sources:
  - https://developer.goodyearsightline.com/
  - https://gaas-portal.goodyear.com/
  - https://gaas-portal.goodyear.com/signup
plans:
  - id: goodyear-tire-and-rubber-partner
    name: Partner / Enterprise
    type: enterprise
    description: Contracted access to Goodyear's developer APIs (SightLine intelligent-tire data, GaaS
      portal, truck tire catalog, work orders, service tickets). Commercial terms, quotas, and rate caps
      are negotiated per agreement; not publicly disclosed.
    entries:
      - label: Contracted access
        description: Negotiated access to the SightLine + GaaS API portfolio under a partnership or fleet
          customer agreement
        name: contracted_access
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://developer.goodyearsightline.com
          - https://gaas-portal.goodyear.com
          - https://api.catalog.goodyeartrucktires.com
          - https://api.workorder.goodyeartrucktires.com
          - https://api.serviceticket.goodyeartrucktires.com
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Goodyear SightLine API
      - name: Goodyear API Management Portal
      - name: Goodyear Truck Tire Catalog API
      - name: Goodyear Work Order API
      - name: Goodyear Service Ticket API
      - name: Partner onboarding via GaaS portal
