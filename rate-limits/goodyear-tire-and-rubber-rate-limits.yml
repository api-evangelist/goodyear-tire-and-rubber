specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Goodyear Tire & Rubber
providerId: goodyear-tire-and-rubber
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Connected Vehicles
  - Fleet Management
  - IoT
  - Telematics
  - Tires
  - Rate Limiting
description: Goodyear's developer APIs (SightLine, GaaS portal, Truck Tire Catalog, Work Order, Service
  Ticket) do not publish public rate-limit numbers. Quotas and throttling are negotiated at partner onboarding.
  This file captures the standard response-code shape and recovery policy expected of an enterprise B2B
  API surface; replace with documented limits once the API reference exposes them.
notes: No public rate-limit documentation was found at developer.goodyearsightline.com or gaas-portal.goodyear.com
  at reconciliation time. The limits entry below is a placeholder describing the scope; consumers should
  request limit details during partner onboarding.
sources:
  - https://developer.goodyearsightline.com/
  - https://gaas-portal.goodyear.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-account contracted limit
    scope: account
    metric: varies
    limit: see partner agreement
    applies:
      - Goodyear SightLine API
      - Goodyear API Management Portal
      - Goodyear Truck Tire Catalog API
      - Goodyear Work Order API
      - Goodyear Service Ticket API
policies:
  - name: Backoff Strategy
    description: Implement exponential backoff with jitter and honor Retry-After headers when present.
  - name: Partner-negotiated limits
    description: Concrete request-rate and concurrency caps are set per partnership agreement during GaaS
      portal onboarding rather than published publicly.
  - name: Fair use
    description: Goodyear may throttle workloads that materially impact shared infrastructure even when
      under the contracted ceiling.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
